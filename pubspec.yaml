name: radio_lumen_v2
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  dio: ^5.9.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  go_router: ^17.2.3
  shared_preferences: ^2.5.5
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  intl: ^0.20.2
  google_fonts: ^8.1.0
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.3.0
  share_plus: ^13.1.0
  html: ^0.15.6
  xml: ^6.5.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/fonts/
    - assets/icons/
    - assets/logos/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/launcher/foreground_icon.png"
  image_path_ios: "assets/icons/launcher/iOS_Icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#2B5F84"
  adaptive_icon_foreground: "assets/icons/launcher/foreground_icon.png"
  adaptive_icon_foreground_inset: 20
